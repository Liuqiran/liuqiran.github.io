{{- if not (partial "is_ai_assisted.html" .) -}}
  <div class="kq-human-note">
    {{- if hasPrefix .Lang "zh" -}}
      <strong>声明：</strong>本文由人类创作，非 AI 生成。
    {{- else if or (hasPrefix .Lang "ja") (hasPrefix .Lang "jp") -}}
      <strong>注記：</strong>この記事は人間が作成したもので、AI 生成ではありません。
    {{- else -}}
      <strong>Note:</strong> This post was created by a human, not generated by AI.
    {{- end -}}
  </div>
{{- end -}}
